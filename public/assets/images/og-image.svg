<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f4f4f5"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Accent bar -->
  <rect x="0" y="0" width="1200" height="8" fill="#DC2626"/>
  <!-- Sock icon -->
  <text x="600" y="260" text-anchor="middle" font-size="140" font-family="Segoe UI Emoji, Apple Color Emoji, sans-serif">&#x1F9E3;</text>
  <!-- Brand name -->
  <text x="600" y="400" text-anchor="middle" font-size="96" font-weight="800" font-family="Arial, Helvetica, sans-serif" fill="#18181B">BEN<tspan fill="#DC2626">SHOP</tspan></text>
  <!-- Subtitle -->
  <text x="600" y="470" text-anchor="middle" font-size="40" font-weight="400" font-family="Arial, Helvetica, sans-serif" fill="#18181B" opacity="0.6">Chaussettes Premium</text>
  <!-- Bottom accent bar -->
  <rect x="0" y="622" width="1200" height="8" fill="#DC2626"/>
</svg>